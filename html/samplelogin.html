<!DOCTYPE html>
<html>

<head>
    <title>
        sample login
    </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            background-color: rgb(58, 63, 63);
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .continer {
            width: 500px;
            padding: 40px;
            background: #5456cc26;
            backdrop-filter: blur(10px);
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);

        }

        .continer h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;

        }

        .form label {
            display: block;
            color: white;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-group {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            margin-bottom: 15px;
        }
        .options{
    display:flex; 
    justify-content:space-between;
    margin-bottom:20px;
    color:white;
    font-size:14px;
        }

        .login-btn{
    width:50%; 
    margin-left:60px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#eee5e5;
    color:#764ba2;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

    </style>
</head>

<body>

    <div class="continer">
        <h2> Sample Login</h2>
        <form class="form">
            <label>Username:</label>
            <input  class="input-group" type="text" name="username" placeholder="Enter your Userid">
            <br>
            <label>Password:</label>
            <input  class="input-group"  type="password" name="password" placeholder="Enter Password">
            <br>
               <div class="options">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

             <button type="submit" class="login-btn">Sign In</button>

        </form>

    </div>
</body>

</html>
