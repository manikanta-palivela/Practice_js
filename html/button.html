<!DOCTYPE html>
<html lang="en">
<head> 
    <title>Document</title>
    <style>
    .scbscribe-btn{
        background-color: red;
        color:white;
        height: 35px;
        width: 105px;
        border-radius: 2px;
        border: none;
    }
     .join-btn{
        border-color: rgb(9, 126, 194);
        color:rgb(9, 126, 194);
        height: 35px;
        width: 105px;
        border-radius: 2px;
          
    }
 
     .tweet-btn{
        background-color: rgba(15, 147, 223, 0.74);
        color:white;
        height: 35px;
        width: 105px;
        border-radius: 5px;
       font-weight: 500;
        border: none;
    }

</style>

</head>
<body>
    
<button class="scbscribe-btn" onclick="subscribe()">SUBSCRIBE</button>
<button class="join-btn">JOIN</button>
<button class="tweet-btn">TWEET</button> 

<script>
    function subscribe(){
       let value= document.querySelector('.scbscribe-btn').innerHTML ;
       if(value==='SUBSCRIBE'){
      document.querySelector('.scbscribe-btn').innerHTML='SUBSCRIBED';
      document.querySelector('.scbscribe-btn').style.backgroundColor='rgb(9, 126, 194)';
       }
       else{
        document.querySelector('.scbscribe-btn').innerHTML='SUBSCRIBE';
        document.querySelector('.scbscribe-btn').style.backgroundColor='red';  
       }
    }
</script>
</body>
</html>
