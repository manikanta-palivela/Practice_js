<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#586083,#764ba2);
}

.login-container{
    width:580px;
    padding:40px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.2);
}

.login-container h2{
    text-align:center;
    color:#fff;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    color:#fff;
    margin-bottom:8px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:12px 15px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.2);
    color:#fff;
    font-size:15px;
}

.input-group input::placeholder{
    color:#e0e0e0;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    color:white;
    font-size:14px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ffffff;
    color:#764ba2;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#f1f1f1;
    transform:translateY(-2px);
}

.register{
    text-align:center;
    margin-top:20px;
    color:white;
}

.register a{
    color:#fff;
    font-weight:bold;
    text-decoration:none;
}

.register a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>User ID</label>
            <input type="text" placeholder="Enter your User ID" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your Password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="register">
            Don't have an account?
            <a href="#">Register</a>
        </div>
    </form>
</div>

</body>
</html>
