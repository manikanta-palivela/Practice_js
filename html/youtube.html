<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="css/youtube.css">
</head>

<body>
    <div class="mdiv" style="display: grid; grid-template-columns: 1fr 1fr 1fr; margin-top:50px; 
    column-gap:20px; row-gap:20px; ">
        <div style="background-color: blanchedalmond; height: 100px;">div1</div>
        <div style="background-color: aqua; height: 100px">div2</div>
        <div style="background-color: rgb(11, 104, 104); height: 100px">div3 </div>
        <div style="background-color:blanchedalmond; height: 100px">div1</div>
        <div style="background-color: aqua; height: 100px">div2</div>
        <div style="background-color: rgb(17, 138, 138); height: 100px">div3 </div>
    </div>
    <div>
        <br>
    </div>

    <div style="display:flex; flex-direction:row; margin-top:50px;
     border:1px solid black; height:100px; column-gap:10px; text-align:center;align-items:center;">
        <div style="background-color: cadetblue;   flex:1;">div1</div>
        <div style="background-color: bisque;  flex:1;">div2</div>
        <div style="background-color: blueviolet;  flex:1;">div3</div>
    </div>

    <div class="header">
        <div class="left">
            <img class="menu" src="images/OIP.webp" alt="">
            <img class="logo" src="images/youtybe.webp" alt="">
        </div>
        <div class="middle">
            <input class="input" type="text" placeholder="Search">
            <button> <img class="search" src="images/search.jpg" alt="Search"></button>
            <button class="micbtn"> <img class="mic" src="images/OIP (1).webp" alt="Mic"></button>
        </div>
        <div class="right">
            <button>
                <img class="create" src="images/createbutton.webp" alt="Create">
            </button>
            <button             >
                <img class="apps" src="images/notification.jpg" alt="Apps">

            </button>
            <button>
                <img class="profile" src="images/profile.jpg" alt="Profile">

            </button>
        </div>
    </div>
</body>

</html>
