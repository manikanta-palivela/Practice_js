<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Promises</title>
</head>
<body>
    <script>
        function preparefood(){
                     let ispreparefood=true;
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(ispreparefood){
                     resolve("food is prepared");
                    }
                    else{
                        reject("food is not prepared");
                    }
                   

                },2000)
            })
        }

        function eatfood(){
                    let iseatfood=false;
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(iseatfood){
                    resolve("food is eaten");
                    }
                    else{
                        reject("din not eat food");
                    }
                   

                },3000)
            })
        }

         function gotoschool(){
  let isgoingschool=true;
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(isgoingschool){
                        resolve("went to school");
                    }
                    else{
                        reject("did not go to school");
                    }
                },1500)
            })
        }

        preparefood().then((value)=>{
            console.log(value);
            return eatfood();
        }).then((value)=>{
            console.log(value);
            return gotoschool();
        }).then((value)=>{
            console.log(value);
            console.log(("all Peomises are aresolved..."))
        }).catch((error)=>{
            console.log(error);
        }).finally(()=>{
            console.log("all promises are resolved or rejected");
        })
    </script>
</body>
</html>
