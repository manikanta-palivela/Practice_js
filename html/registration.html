<!DOCTYPE html>
<html>
    <head>
        <title>
            Registration Form
        </title>
          <link rel="stylesheet" href="css/registration.css">
        
     </head>
    <body>
        <div class="reg-container">
<form class="form-container">
    <img src="/mypic.jpeg" alt="mypic">
<h3>Student Registration Form</h3>
<div class="input-group">
    <label>NAME</label>
    <input type="text" placeholder="Enter Your Name">
</div>  
<div class="input-group">
    <label>FATHER NAME</label>
    <input type="text" placeholder="Enter Your Fname">
</div>
<div class="input-group">
    <label>MOYHER NAME</label>
    <input type="text" placeholder="Enter Your Mname">
</div>
<div class="input-group">
    <label>MOBILE</label>
    <input type="mobile" placeholder="Enter Your Mobile">
</div>
<div class="input-group">
    <label>EMAIL</label>
    <input type="text" placeholder="Enter Your Email">
</div>
<div class="input-group">
    <label>ADDRESS</label>
    <input type="text" style="height:100px" placeholder="Enter Your Address">
</div>
<button>Submit</button>
</form>
        </div> 
    </body>
</html>
