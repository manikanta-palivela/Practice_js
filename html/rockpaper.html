<!DOCTYPE html>
<html lang="en">
<head>
     
    <title>Rock Paper Scisor</title>
</head>
<body>
    <button  onclick=" pick('Rock');
     ">Rock</button>
    <button  onclick=" pick('Paper')">Paper</button>
    <button  onclick=" pick('Scissor')">Scissor</button>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
     <button  onclick=" 
      localStorage.removeItem('store');
     store.win=0,store.lose=0,store.tie=0"
     
     
     >Reset</button>


        <script>
              const store=JSON.parse(localStorage.getItem("store")) ||
             { win:0 ,  lose:0, tie:0 } ;

            jsscore();

          function pick(move)
          {
          let  computerguess=  guess();
           let result='';

            if(move==='Rock'){
             
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='you loss';
          }
          else if(computerguess ==='scissor'){
            result='tie';
          }  

          } else if(move==='Paper')
             {
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='tie';
          }
          else if(computerguess ==='scissor'){
            result='you loss';
          }  
        }
        else if(move==='Scissor')
             {
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='you loss';
          }
          else if(computerguess ==='scissor'){
            result='tie';
          } 
        }  


          if(result==='you win')
          {
            store.win+=1
          }
          else if(result==='you loss')
          {
            store.lose+=1
          }
          else if(result==='tie'){
            store.tie+=1
          }
          localStorage.setItem("store",JSON.stringify(store)) ;

           document.querySelector('.js-result').innerHTML=result;
            document.querySelector('.js-moves').innerHTML=`you picked  ${move} - computer picked ${computerguess}`;
             jsscore();
 
        }

        function jsscore(){
          document.querySelector('.js-score').innerHTML=`
          win:${store.win} , lose:${store.lose} , tie: ${store.tie}`
        }
        
          function guess(){
         const random=Math.random();
         let computerguess='';
         if(random>0 && random<1/3){
         computerguess='Rock';
         } else if(random>=1/3 && random <2/3)
         {
            computerguess='paper';
         }
         else if(random>=2/3 && random<1)
         {
            computerguess='scissor'
         }
        return(computerguess);

          }
        </script>
</body>
</html>
