<!DOCTYPE html>
<html lang="en">
<head>
     
    <title>Rock Paper Scisor</title>
    <style>
      body{
        background-color: rgb(25, 25, 25);
        color: white;
      }
      .moves{
        height:50px;
      }
      .move-btn{
        background-color: transparent;
        border: 2px solid white;
        border-radius: 50%;
        height:120px;
        width: 120px;
        margin-right: 10px;
      }
      .result{
        font-size: 20px;
        font-weight: 600;
      }
      .move{
        font-size: 20px;
        font-weight: 600;
      }
      .score{
        font-size:20px;
        font-weight: 600;
      }
    </style>
</head>
<body>
  <h2>Rock Paper Scissor</h2>
    <button class="move-btn"  onclick=" pick('Rock');"><img class="moves" src="images/rock-emoji.png" alt=""></button>
    <button class="move-btn"   onclick=" pick('Paper')"><img class="moves" src="images/paper-emoji.png" alt=""></button>
    <button  class="move-btn"  onclick=" pick('Scissor')"><img class="moves" src="images/scissor-emoji.png" alt=""></button>
    <p class="js-result result"></p>
    <p class="js-moves move"></p>
    <p class="js-score score"></p>
     <button  onclick=" 
      localStorage.removeItem('store');
     store.win=0,store.lose=0,store.tie=0"
     
     
     >Reset</button>


        <script>
              const store=JSON.parse(localStorage.getItem("store")) ||
             { win:0 ,  lose:0, tie:0 } ;

            jsscore();

          function pick(move)
          {
          let  computerguess=  guess();
           let result='';

            if(move==='Rock'){
             
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='you loss';
          }
          else if(computerguess ==='scissor'){
            result='tie';
          }  

          } else if(move==='Paper')
             {
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='tie';
          }
          else if(computerguess ==='scissor'){
            result='you loss';
          }  
        }
        else if(move==='Scissor')
             {
          if(computerguess ==='Rock'){
            result='you win';
          } else if(computerguess ==='paper'){
            result='you loss';
          }
          else if(computerguess ==='scissor'){
            result='tie';
          } 
        }  


          if(result==='you win')
          {
            store.win+=1
          }
          else if(result==='you loss')
          {
            store.lose+=1
          }
          else if(result==='tie'){
            store.tie+=1
          }
          localStorage.setItem("store",JSON.stringify(store)) ;

           document.querySelector('.js-result').innerHTML=result;
            document.querySelector('.js-moves').innerHTML=`you picked <img class="moves" src="images/${move}-emoji.png" > - computer picked <img class="moves" src="images/${computerguess}-emoji.png" > `;
             jsscore();
 
        }

        function jsscore(){
          document.querySelector('.js-score').innerHTML=`
          win:${store.win} , lose:${store.lose} , tie: ${store.tie}`
        }
        
          function guess(){
         const random=Math.random();
         let computerguess='';
         if(random>0 && random<1/3){
         computerguess='Rock';
         } else if(random>=1/3 && random <2/3)
         {
            computerguess='paper';
         }
         else if(random>=2/3 && random<1)
         {
            computerguess='scissor'
         }
        return(computerguess);

          }
        </script>
</body>
</html>
